name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME || 'solutions-hub' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Cloudflare Pages project if needed
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create ${{ env.PROJECT_NAME }} --production-branch=main

      - name: Generate deployments list
        if: github.ref == 'refs/heads/main'
        run: |
          # Fetch latest deployments from Cloudflare Pages API
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/${{ env.PROJECT_NAME }}/deployments?sort_by=created_on&sort_order=desc&per_page=50")

          # Parse into deployments.json using jq
          echo "$RESPONSE" | jq '{
            generated_at: now | todate,
            deployments: [
              .result[]
              | select(.latest_stage.name == "deploy" and .latest_stage.status == "success")
              | {
                  branch: .deployment_trigger.metadata.branch,
                  url: .url,
                  created_on: .created_on,
                  commit_hash: .deployment_trigger.metadata.commit_hash,
                  commit_message: .deployment_trigger.metadata.commit_message
                }
            ]
            | unique_by(.branch)
          }' > public/deployments.json

          echo "Generated deployments.json:"
          cat public/deployments.json

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ env.PROJECT_NAME }} --branch=${{ github.head_ref || github.ref_name }} --commit-dirty=true

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = '${{ steps.deploy.outputs.deployment-url }}';
            const branch = context.payload.pull_request.head.ref;
            const body = [
              '## Preview Deployment',
              '',
              `Branch \`${branch}\` has been deployed.`,
              '',
              `**Preview URL:** ${deployUrl}`,
              '',
              '---',
              '_Deployed via Cloudflare Pages_'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Preview Deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Output deployment URL
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.head_ref || github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
